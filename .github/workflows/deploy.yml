name: Deploy Serverless Image Processor

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Build, Package & Deploy
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────
      - name: Checkout source code
        uses: actions/checkout@v4

      # ── 2. Python setup ──────────────────────────────────────────────
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ── 3. Build Lambda package ──────────────────────────────────────
      - name: Install Lambda dependencies
        run: |
          pip install -r lambda/requirements.txt -t lambda/

      - name: Package Lambda function into zip
        run: |
          cd lambda
          zip -r lambda_function.zip . -x "*.pyc" -x "__pycache__/*" -x "requirements.txt"

      # ── 4. AWS Authentication ────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: eu-north-1

      # ── 4b. Ensure Terraform state bucket exists ─────────────────────
      - name: Create Terraform state bucket if not exists
        run: |
          aws s3api head-bucket --bucket terraform-state-roobybiju-thesis 2>/dev/null || \
          aws s3api create-bucket \
            --bucket terraform-state-roobybiju-thesis \
            --region eu-north-1 \
            --create-bucket-configuration LocationConstraint=eu-north-1

      # ── 5. Terraform ─────────────────────────────────────────────────
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Plan
        working-directory: terraform
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve tfplan
